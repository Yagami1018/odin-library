<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Library</title>
        <link rel="stylesheet" href="style.css" />
        <script src="index.js" defer></script>
    </head>
    <body>
        <div class="container">
            <div class="sidebar">
                <form class="form">
                    <div class="fields">
                        <div class="labels">
                            <label for="author">Author: </label>
                            <input type="text" name="" id="author" />
                        </div>
                        <div class="labels">
                            <label for="title">Title: </label>
                            <input type="text" name="" id="title" />
                        </div>
                        <div class="labels">
                            <label for="pages">Pages:</label>
                            <input type="number" name="" id="pages" />
                        </div>
                        <div class="labels reading">
                            <label for="reading">Reading:</label>
                            <input type="checkbox" name="" id="reading" />
                        </div>
                        
                    </div>
                    <div class="buttons">
                        <button class="add">Add</button>
                        <button class="reset">Reset</button>
                    </div>
                </form>
            </div>
            <div class="content">
                <h1 class="header">My Library</h1>
                <button class="new-book">New Book</button>
                <div class="card-container">
                    <div class="card">
